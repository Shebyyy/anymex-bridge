name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "=== Deploying anymex-bridge ==="
            cd /root/anymex-bridge

            # Init git if needed
            if [ ! -d .git ]; then
              git clone https://github.com/Shebyyy/anymex-bridge.git .
            fi

            # Pull latest
            git fetch origin main
            git reset --hard origin/main

            # Install deps
            /root/.bun/bin/bun install

            # Kill old process
            pkill -f "bun.*index.ts" 2>/dev/null || true
            sleep 2

            # Start fresh
            cd /root/anymex-bridge
            nohup /root/.bun/bin/bun run /root/anymex-bridge/index.ts > /tmp/bridge-deploy.log 2>&1 &
            sleep 5

            # Verify
            if ss -tlnp | grep -q 3022; then
              echo "✅ Bridge is running on port 3022"
            else
              echo "❌ Bridge failed to start!"
              cat /tmp/bridge-deploy.log
              exit 1
            fi
