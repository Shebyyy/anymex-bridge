name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 60s
          script: |
            echo "=== Deploying anymex-bridge ==="

            if [ -d /tmp/anymex-bridge-deploy/.git ]; then
              cd /tmp/anymex-bridge-deploy
              git pull origin main
            else
              rm -rf /tmp/anymex-bridge-deploy
              git clone https://github.com/Shebyyy/anymex-bridge.git /tmp/anymex-bridge-deploy
            fi

            rsync -a --exclude='.git' --exclude='data' --exclude='.env' --exclude='node_modules' /tmp/anymex-bridge-deploy/ /root/anymex-bridge/

            cd /root/anymex-bridge
            /root/.bun/bin/bun install

            pkill -f "bun.*index.ts" 2>/dev/null || true
            sleep 2

            nohup /root/.bun/bin/bun run /root/anymex-bridge/index.ts > /tmp/bridge-deploy.log 2>&1 &
            sleep 5

            if ss -tlnp | grep -q 3022; then
              echo "✅ Bridge is running on port 3022"
            else
              echo "❌ Bridge failed to start!"
              cat /tmp/bridge-deploy.log
              exit 1
            fi
